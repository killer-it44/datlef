<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='icon' href='datlef-small.png' type='image/png'>
    <title>Datlef - Your Best Friend for Data Crunching</title>
</head>
<body style='margin: .5em;'>
    <div id='header' style='height: 5vh;'>
        <select id='queries' onchange='selectQuery()'>
        </select>
        <input id='showConsole' type='checkbox' onclick='toggleConsole()'>Console</button>
    </div>

    <div id='console' style='display: none;'>
        <textarea id='sql' style='height: 18em; resize: none;' placeholder='Enter your sql or describe what you want and click the AI button. Click the info button to see the data structures and get a basic query.' ></textarea>
        <div style='display: flex;'>
            <button onclick='ai()' title='Ask the AI assistant to suggest a query based on your instructions.'>🤖</button>
            <button onclick='info()' title='Display information about the tables you can query. It will be displayed as a comment in the console, so you can just put your query above or below and copy/paste information.'>ℹ️</button>
            <button onclick='run()' title='Run your query.'>▶️</button>

            <input style='margin-left: auto;' id='queryname' placeholder='query name' value='' title='The name under which you want to save the query. If the query name already exists, it will be considered as an update and you need to match the owner name to make sure you are not accidentally overriding the query of someone else.'/>
            <input id='owner' placeholder='owner' value='' title='Control field to make sure you are not accidentally overriding the queries from other people. When the query name already exists, the owner needs to match, otherwise saving will be aborted. You can use whatever you want as owner, such as your name, user id, your topic, team name, etc.'/>
            <button onclick='save()'>💾</button>
            <button onclick='del()'>❌</button>
        </div>
    </div>

    <div style='max-height: 70vh;'>
        <canvas id='chart'></canvas>
    </div>

    <div style='height: 20vh; overflow-y: auto;'>
        <a id='download' style='display: none;'>Download CSV</a>
        <div id='result'></div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>

    <script>
        const ai = async () => {
            const question = document.getElementById('sql').value
            const response = await fetch(`/api/ai-assistant?question=${question}&schema=${await getTableSchema()}`)
            
            let aiResponse = document.getElementById('sql').value + '\n\n'
            
            if (response.ok) {
                document.getElementById('sql').value = aiResponse + await response.text()
            } else {
                document.getElementById('sql').value = "Fail to connect to AI assistant. Please try again."
            }
        }

        const showAI = async () => {
            document.getElementById('ai').style = document.getElementById('showAI').checked
                ? 'position: absolute; top: 0; left: 40%; display: flex; flex-direction: column; align-items: center; width: 20%; background-color: #efefef; padding: 0.5rem 1rem; gap: 0.5rem;'
                : 'display: none;'
        }

        const info = async () => {
            document.getElementById('sql').value = `/*${await getTableSchema()}*/`
        }

        const getTableSchema = async () => {
            const sql = `SELECT viewname FROM pg_catalog.pg_views WHERE schemaname = 'public'`
            const response = await fetch(`/api/query.json?sql=${encodeURIComponent(sql)}`)
            const views = await response.json()

            let text = ''
            for (view of views) {
                const sql = `SELECT column_name, data_type
                    FROM information_schema.columns WHERE table_schema = 'public' AND table_name ='${view.viewname}';`
                const response = await fetch(`/api/query.json?sql=${sql}`)
                const columns = await response.json()
                const columnsInfo = columns.map(c => '\t' + c.column_name + ': ' + c.data_type).join('\n')
                text += `\n${view.viewname}:\n${columnsInfo}\n`
            }
            return text
        }

        let queries

        const toggleConsole = () => {
            document.getElementById('console').style = document.getElementById('showConsole').checked
                ? 'display: flex; flex-direction: column; position: absolute; top: 2em; width: calc(100% - 1em);'
                : 'display: none;'
        }

        const addQuery = (value, text) => {
            const queryList = document.getElementById('queries')
            const option = document.createElement('option')
            option.value = value
            option.innerHTML = text
            queryList.appendChild(option)
        }

        const loadQueries = async () => {
            try {
                document.getElementById('queries').innerHTML = ''
                const response = await fetch('/api/queries')
                if (!response.ok) {
                    throw new Error(await response.text())
                }
                queries = await response.json()
                addQuery('', '-Select Query-')
                queries.forEach(q => addQuery(q.queryname, q.queryname))
            } catch (e) {
                console.error(e)
                addQuery('', 'COULD NOT LOAD QUERIES')
            }
        }

        const selectQuery = async (evt) => {
            const query = queries.find(q => q.queryname === document.getElementById('queries').value)
            document.getElementById('sql').value = query.sql
            document.getElementById('queryname').value = query.queryname
            document.getElementById('owner').placeholder = query.owner
            run()
        }

        const colors = ['blue', 'green', 'red', 'magenta', 'cyan', 'orange', 'brown', 'purple', 'black']
        let data, labels = [], datasets, chart

        const run = async () => {
            const downloadLink = document.getElementById('download')
            downloadLink.style = 'display: none;'
            const sql = encodeURIComponent(document.getElementById('sql').value)
            const response = await fetch(`/api/query.json?sql=${sql}`)
            chart?.destroy()
            if (response.ok) {
                data = await response.json()
                labels = [], datasets = []
                if (data.length > 0) {
                    const keys = Object.keys(data[0])
                    labels = data.map(record => record[keys[0]])

                    for (let i = 1; i < keys.length; i++) {
                        datasets.push({
                            label: keys[i],
                            data: data.map(record => record[keys[i]]),
                            borderColor: colors[i - 1]
                        })
                    }
                    chart = new Chart(document.getElementById('chart'), { type: 'line', data: { labels, datasets } })

                    const theaders = keys.map(key => `<th style='border: 1px solid;'>${key}</th>`).join('')
                    const trows = data.map(record => `<tr>${keys.map(key => `<td style='border: 1px solid; word-break: break-all;'>${record[key]}</td>`).join('')}</tr>`).join('')
                    document.getElementById('result').innerHTML = `<table style='width: 100%; border-collapse: collapse; table-layout: fixed;'>
                        <thead><tr>${theaders}</tr></thead>
                        <tbody>${trows}</tbody>
                    </table>`

                    downloadLink.style = ''
                    downloadLink.href = `/api/query.csv?sql=${sql}`
                } else {
                    const ctx = document.getElementById('chart').getContext('2d')
                    ctx.fillText('chart not available', 50, 50)
                }
            } else {
                document.getElementById('result').innerHTML = await response.text()
                const ctx = document.getElementById('chart').getContext('2d')
                ctx.fillText('chart not available', 50, 50)
            }
        }

        const save = async () => {
            const response = await fetch(`/api/queries/${document.getElementById('queryname').value}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    owner: document.getElementById('owner').value,
                    sql: document.getElementById('sql').value
                })
            })
            document.getElementById('data').innerHTML = await response.text()
            if (response.ok) loadQueries()
        }

        const del = async () => {
            const response = await fetch(`/api/queries/${document.getElementById('queryname').value}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    owner: document.getElementById('owner').value
                })
            })
            document.getElementById('data').innerHTML = await response.text()
            document.getElementById('queryname').value = ''
            document.getElementById('sql').value = ''
            document.getElementById('owner').value = ''
            if (response.ok) loadQueries()
        }

        loadQueries()
    </script>
</body>

</html>
