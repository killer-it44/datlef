<!DOCTYPE html>
<html>

<body>
    <div>
        <select id='queries' onchange='selectQuery()'>
        </select>
        <input id='showHideQueryDetails' type='checkbox' onclick='showHideQueryDetails()'>Show Details</button>
        <a id='download' style='display: none;'>Download CSV</a>
        <input id='showTableStructure' type='checkbox' onclick='showTableStructure()'>Show Table Structure</button>
        <button id='tryAI' onclick='tryAI()'>Test AI</button>
        <div id="tableDetails" style="display: none;">
            <select id='tables' onchange='selectTable()'>                
            </select>
            <div id="tableInfo"></div>
        </div>

        <div id='queryDetails' style='display: none;'>
            <textarea id='sql' style='width: 40vw; height: 12em;'>
            </textarea>
            <div style='display: flex; width: 40vw;'>
                <button onclick='query()' style='width: 10vw;' >Go</button>
                <input id='queryname' style='width: 15vw;' placeholder='query name' value=''/>
                <input id='owner' style='width: 5vw;' placeholder='owner' value=''/>
                <button onclick='save()' style='width: 5vw;'>Save</button>
                <button onclick='del()' style='width: 5vw;'>Delete</button>
            </div>
            <textarea id='data' style='width: 40vw; height: 12em;'>
            </textarea>
        </div>
        <div>
            <canvas id='chart'></canvas>
        </div>
    </div>
    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>

    <script>
        /*
            TODO 1. integrate it better on the UI
            TODO 2. integrate on server aka fetch credentials from cf env insteaf of leaking credentials via hardcoding
            TODO 3. research how well GPT-3.5 supports SQL, or if we need GPT-4.0
        */

            const authUrl = 'https://cc-refapp.authentication.sap.hana.ondemand.com'
            // REVISE: bad hardcoded credentials
            const clientId = 'sb-d994a982-c3d1-48de-8238-dd651802e078!b895|azure-openai-service-i057149-xs!b16730'
            const clientSecret = '4443783a-1ae7-4334-a10d-9fd314b52aeb$nhCXV_IBE0B1doJSy3EiYgwzKhDDtVBhnY2uuxN_VE0='
            const authBody = {'client_id': clientId, 'grant_type': 'client_credentials'}

                method: 'POST',

                body: formBody

            const body = await authResponse.json()

            const response = await fetch('https://azure-openai-serv-i057149.cfapps.sap.hana.ondemand.com/api/v1/completions?deployment_id=gpt-35-turbo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${body.access_token}` },

            })
            alert(await response.json().choices[0].messages.content)
        }


        const showTableStructure = async () => {
            const sql = `SELECT * FROM pg_catalog.pg_tables 
                WHERE schemaname <> 'pg_catalog'
                AND schemaname <> 'information_schema'
                AND schemaname <> 'datlef'
                AND tablename <> 'databasechangelog'
                AND tablename <> 'databasechangeloglock'
            `
            const response = await fetch(`/api/query.json?sql=${encodeURIComponent(sql)}`) 
            const tableData = await response.json()
            const tables = document.getElementById('tables')
            tables.innerHTML = ''
            const placeholder = document.createElement('option')
            placeholder.value = ''
            placeholder.innerHTML = '-Select Table-'
            tables.appendChild(placeholder)

            tableData.forEach(t => {
                const option = document.createElement('option')
                option.value = t.tablename
                option.innerHTML = t.tablename
                tables.appendChild(option)
            })
            document.getElementById('tableDetails').style = document.getElementById('showTableStructure').checked
                ? 'display: flex; flex-direction: column; position: absolute; top: 2em;'
                : 'display: none;'
        }

        const selectTable = async () => {
            const tables = document.getElementById('tables')
            const selectedTable = tables.value
            if (document.getElementById('showTableStructure').checked) {
                const sql = `select column_name, data_type, character_maximum_length
    from INFORMATION_SCHEMA.COLUMNS where table_name ='${selectedTable}';`
                const response = await fetch(`/api/query.json?sql=${sql}`)
                const data = await response.json()
                let ret = "<table><tr><td>column name</td><td>data type</td><td>maximum length</td></tr>"
                data.forEach(column => {
                    ret += "<tr><td>" + column.column_name + "</td>"
                    ret += "<td>" + column.data_type + "</td>"
                    ret += "<td>" + column.character_maximum_length + "</td></tr>"
                })
                ret += "</table>"
                document.getElementById('tableInfo').innerHTML = ret
            }
        }
        let queries

        const showHideQueryDetails = () => {
            document.getElementById('queryDetails').style = document.getElementById('showHideQueryDetails').checked
                ? 'display: flex; flex-direction: column; position: absolute; top: 2em;'
                : 'display: none;'
        }

        const addQuery = (value, text) => {
            const queryList = document.getElementById('queries')
            const option = document.createElement('option')
            option.value = value
            option.innerHTML = text
            queryList.appendChild(option)
        }

        const loadQueries = async () => {
            try {
                document.getElementById('queries').innerHTML = ''
                const response = await fetch('/api/queries')
                if (!response.ok) {
                    throw new Error(await response.text())
                }
                queries = await response.json()
                addQuery('', '-Select Query-')
                queries.forEach(q => addQuery(q.queryname, q.queryname))
            } catch (e) {
                console.error(e)
                addQuery('', 'COULD NOT LOAD QUERIES')
            }
        }

        const selectQuery = async (evt) => {
            const queryname = document.getElementById('queries').value
            document.getElementById('sql').value = queries.find(q => q.queryname === queryname).sql
            document.getElementById('queryname').value = document.getElementById('queries').value
            query()
        }

        const colors = ['blue', 'green', 'red', 'magenta', 'cyan', 'orange', 'brown', 'purple', 'black']
        let data, labels = [], datasets, chart

        const query = async () => {
            const downloadLink = document.getElementById('download')
            downloadLink.style = 'display: none;'
            const sql = encodeURIComponent(document.getElementById('sql').value)
            const response = await fetch(`/api/query.json?sql=${sql}`)
            if (response.ok) {
                data = await response.json()
                const keys = Object.keys(data[0])
                labels = data.map(record => record[keys[0]])
                datasets = []

                for (let i = 1; i < keys.length; i++) {
                    datasets.push({
                        label: keys[i],
                        data: data.map(record => record[keys[i]]),
                        borderColor: colors[i - 1]
                    })
                }

                chart.destroy()
                renderChart()
                document.getElementById('data').innerHTML = JSON.stringify(data, null, '  ')
                downloadLink.style = ''
                downloadLink.href = `/api/query.csv?sql=${sql}`
            } else {
                document.getElementById('data').innerHTML = await response.text()
            }
        }

        const save = async () => {
            const response = await fetch(`/api/queries/${document.getElementById('queryname').value}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    owner: document.getElementById('owner').value,
                    sql: document.getElementById('sql').value
                })
            })
            document.getElementById('data').innerHTML = await response.text()
            if (response.ok) loadQueries()
        }

        const del = async () => {
            const response = await fetch(`/api/queries/${document.getElementById('queryname').value}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    owner: document.getElementById('owner').value
                })
            })
            document.getElementById('data').innerHTML = await response.text()
            document.getElementById('queryname').value = ''
            document.getElementById('sql').value = ''
            document.getElementById('owner').value = ''
            if (response.ok) loadQueries()
        }

        const renderChart = () => {
            chart = new Chart(document.getElementById('chart'), {
                type: 'line',
                data: { labels, datasets }
            })
        }

        loadQueries()
        renderChart()
    </script>
</body>

</html>
